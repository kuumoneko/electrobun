name: Build FFmpeg shared libraries

on:
    workflow_dispatch:
    push:
        branches: [main]

env:
    PREFIX: ${{ github.workspace }}/prefix
    FFMPEG_VERSION: n7.1
    STAGING: ${{ github.workspace }}/staging
    DECODERS: aac,aac_latm,ac3,alac,ape,flac,opus,vorbis,wmav1,wmav2,wmapro,wmalossless,wmavoice,pcm_alaw,pcm_mulaw,pcm_s16le,pcm_s16be,pcm_s24le,pcm_s24be,pcm_s32le,pcm_s32be,pcm_f32le,pcm_f32be,pcm_u8,pcm_u16le,pcm_u16be,pcm_u24le,pcm_u24be,pcm_u32le,pcm_u32be,pcm_s8,dca,dsd_lsbf,dsd_msbf,dsd_lsbf_planar,dsd_msbf_planar,eac3,mlp,wavpack,tta,cook,shorten,tak,mp1,mp1float,mp2,mp2float,mp3,mp3float
    DEMUXERS: aac,ac3,aiff,ape,asf,au,flac,matroska,mov,mp3,mpc,mpc8,ogg,rm,wav,wv,dsf,tak,tta,image2,pcm_alaw,pcm_mulaw,flv
    PARSERS: aac,ac3,cook,dca,flac,mpegaudio,tak,vorbis
    BSFS: aac_adtstoasc,extract_extradata,mp3_header_decompress
    MUXERS: mp4,mov,null,wav
    ENCODERS: aac,pcm_s16le

jobs:
    build-linux:
        runs-on: ubuntu-latest
        steps:
            - name: Install system deps
              run: |
                  sudo apt update
                  sudo apt install -y nasm pkg-config

            - name: Cache FFmpeg
              id: cache-ffmpeg
              uses: actions/cache@v4
              with:
                  path: ${{ env.PREFIX }}
                  key: ffmpeg-linux-x86_64-${{ env.FFMPEG_VERSION }}

            - name: Build FFmpeg (shared, audio-only)
              if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
              run: |
                  git clone --depth 1 --branch $FFMPEG_VERSION \
                    https://git.ffmpeg.org/ffmpeg.git ffmpeg
                  cd ffmpeg
                  ./configure \
                    --prefix=$PREFIX \
                    --enable-shared --disable-static --enable-pic --enable-small \
                    --disable-doc --disable-debug --disable-programs \
                    --disable-avdevice --disable-avfilter --disable-swscale \
                    --disable-postproc --disable-everything \
                    --enable-network --enable-zlib \
                    --enable-protocol=file,pipe,cache,http,https,tcp,tls \
                    --enable-decoder="$DECODERS" \
                    --enable-demuxer="$DEMUXERS" \
                    --enable-parser="$PARSERS" \
                    --enable-bsf="$BSFS" \
                    --enable-muxer="$MUXERS" \
                    --enable-encoder="$ENCODERS"
                  make -j$(nproc) install

            - name: Stage shared libraries
              run: |
                  mkdir -p $STAGING
                  cp $PREFIX/lib/libavutil.so*   $STAGING/
                  cp $PREFIX/lib/libavformat.so* $STAGING/
                  cp $PREFIX/lib/libavcodec.so*  $STAGING/
                  cp $PREFIX/lib/libswresample.so* $STAGING/
                  cp $PREFIX/lib/pkgconfig/*.pc $STAGING/
                  ls -lh $STAGING/

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ffmpeg-shared-linux-x86_64
                  path: ${{ env.STAGING }}/*

    build-windows:
        runs-on: windows-latest
        env:
            MSYSTEM: UCRT64
        steps:
            - name: Setup MSYS2
              uses: msys2/setup-msys2@v2
              with:
                  msystem: UCRT64
                  update: true
                  install: >-
                      mingw-w64-ucrt-x86_64-gcc
                      mingw-w64-ucrt-x86_64-git
                      mingw-w64-ucrt-x86_64-nasm
                      mingw-w64-ucrt-x86_64-pkgconf
                      make

            - name: Cache FFmpeg
              id: cache-ffmpeg
              uses: actions/cache@v4
              with:
                  path: ${{ env.PREFIX }}
                  key: ffmpeg-windows-x86_64-${{ env.FFMPEG_VERSION }}

            - name: Build FFmpeg (shared, audio-only)
              if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
              shell: C:\msys64\usr\bin\bash.exe --login {0}
              run: |
                  set -e
                  echo "=== PATH ===" && echo "$PATH"
                  echo "=== which git ===" && which git || echo "git not found"
                  echo "=== which make ===" && which make || echo "make not found"
                  echo "=== ls /ucrt64/bin/git* ===" && ls -la /ucrt64/bin/git* 2>/dev/null || echo "no git in /ucrt64/bin"
                  echo "=== ls /usr/bin/make* ===" && ls -la /usr/bin/make* 2>/dev/null || echo "no make in /usr/bin"
                  echo "=== pacman -Q ===" && pacman -Q mingw-w64-ucrt-x86_64-git make 2>/dev/null || echo "packages not found"
                  pacman -S --noconfirm --needed \
                    mingw-w64-ucrt-x86_64-git make
                  git clone --depth 1 --branch $FFMPEG_VERSION \
                    https://git.ffmpeg.org/ffmpeg.git ffmpeg
                  cd ffmpeg
                  ./configure \
                    --prefix=$PREFIX \
                    --arch=x86_64 --target-os=mingw32 \
                    --cross-prefix=x86_64-w64-mingw32- \
                    --enable-shared --disable-static --enable-pic --enable-small \
                    --disable-doc --disable-debug --disable-programs \
                    --disable-avdevice --disable-avfilter --disable-swscale \
                    --disable-postproc --disable-everything \
                    --enable-network --enable-zlib \
                    --enable-protocol=file,pipe,cache,http,https,tcp,tls \
                    --enable-decoder="$DECODERS" \
                    --enable-demuxer="$DEMUXERS" \
                    --enable-parser="$PARSERS" \
                    --enable-bsf="$BSFS" \
                    --enable-muxer="$MUXERS" \
                    --enable-encoder="$ENCODERS"
                  make -j$(nproc) install

            - name: Stage shared libraries
              shell: C:\msys64\usr\bin\bash.exe {0}
              env:
                  MSYSTEM: UCRT64
              run: |
                  export PATH="/ucrt64/bin:/usr/bin:/usr/local/bin:$PATH"
                  mkdir -p $STAGING
                  cp $PREFIX/bin/avutil-*.dll      $STAGING/
                  cp $PREFIX/bin/avformat-*.dll    $STAGING/
                  cp $PREFIX/bin/avcodec-*.dll     $STAGING/
                  cp $PREFIX/bin/swresample-*.dll  $STAGING/
                  cp $PREFIX/lib/pkgconfig/*.pc    $STAGING/ 2>/dev/null || true
                  ls -lh $STAGING/

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ffmpeg-shared-windows-x86_64
                  path: ${{ env.STAGING }}/*

    build-macos:
        runs-on: macos-latest
        steps:
            - name: Install system deps
              run: |
                  brew update
                  brew install nasm pkg-config

            - name: Cache FFmpeg
              id: cache-ffmpeg
              uses: actions/cache@v4
              with:
                  path: ${{ env.PREFIX }}
                  key: ffmpeg-macos-x86_64-${{ env.FFMPEG_VERSION }}

            - name: Build FFmpeg (shared, audio-only)
              if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
              run: |
                  git clone --depth 1 --branch $FFMPEG_VERSION \
                    https://git.ffmpeg.org/ffmpeg.git ffmpeg
                  cd ffmpeg
                  ./configure \
                    --prefix=$PREFIX \
                    --enable-shared --disable-static --enable-pic --enable-small \
                    --disable-doc --disable-debug --disable-programs \
                    --disable-avdevice --disable-avfilter --disable-swscale \
                    --disable-postproc --disable-everything \
                    --enable-network --enable-zlib \
                    --enable-protocol=file,pipe,cache,http,https,tcp,tls \
                    --enable-decoder="$DECODERS" \
                    --enable-demuxer="$DEMUXERS" \
                    --enable-parser="$PARSERS" \
                    --enable-bsf="$BSFS" \
                    --enable-muxer="$MUXERS" \
                    --enable-encoder="$ENCODERS"
                  make -j$(sysctl -n hw.logicalcpu) install

            - name: Stage shared libraries
              run: |
                  mkdir -p $STAGING
                  cp $PREFIX/lib/libavutil*.dylib   $STAGING/
                  cp $PREFIX/lib/libavformat*.dylib $STAGING/
                  cp $PREFIX/lib/libavcodec*.dylib  $STAGING/
                  cp $PREFIX/lib/libswresample*.dylib $STAGING/
                  cp $PREFIX/lib/pkgconfig/*.pc $STAGING/
                  ls -lh $STAGING/

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ffmpeg-shared-macos-x86_64
                  path: ${{ env.STAGING }}/*
