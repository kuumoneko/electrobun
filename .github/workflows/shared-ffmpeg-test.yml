name: Build Shared FFmpeg n8.1

on:
    workflow_dispatch:

env:
    FFMPEG_VERSION: n8.1
    PREFIX: ${{ github.workspace }}/prefix
    STAGING: ${{ github.workspace }}/staging
    DECODERS: aac,aac_latm,ac3,alac,ape,flac,opus,vorbis,wmav1,wmav2,wmapro,wmalossless,wmavoice,pcm_alaw,pcm_mulaw,pcm_s16le,pcm_s16be,pcm_s24le,pcm_s24be,pcm_s32le,pcm_s32be,pcm_f32le,pcm_f32be,pcm_u8,pcm_u16le,pcm_u16be,pcm_u24le,pcm_u24be,pcm_u32le,pcm_u32be,pcm_s8,dca,dsd_lsbf,dsd_msbf,dsd_lsbf_planar,dsd_msbf_planar,eac3,mlp,wavpack,tta,cook,shorten,tak,mp1,mp1float,mp2,mp2float,mp3,mp3float
    DEMUXERS: aac,ac3,aiff,ape,asf,au,flac,matroska,mov,mp3,mpc,mpc8,ogg,rm,wav,wv,dsf,tak,tta,image2,pcm_alaw,pcm_mulaw,flv
    PARSERS: aac,ac3,cook,dca,flac,mpegaudio,tak,vorbis
    BSFS: aac_adtstoasc,extract_extradata,mp3_header_decompress
    MUXERS: mp4,mov,null,wav
    ENCODERS: aac,pcm_s16le

jobs:
    build:
        name: Build on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-22.04
                      artifact-name: ffmpeg-shared-linux-x86_64
                    - os: macos-latest
                      artifact-name: ffmpeg-shared-macos-x86_64
                    - os: windows-latest
                      artifact-name: ffmpeg-shared-windows-x86_64

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            # ----------------------------------------------------------------
            # ENVIRONMENT SETUP
            # ----------------------------------------------------------------
            - name: Install Dependencies (Linux)
              if: matrix.os == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential nasm pkg-config yasm

            - name: Install Dependencies (macOS)
              if: matrix.os == 'macos-latest'
              run: |
                  brew update
                  brew install nasm pkg-config yasm gcc

            - name: Install Dependencies (Windows via MSYS2)
              if: matrix.os == 'windows-latest'
              uses: msys2/setup-msys2@v2
              with:
                  msystem: UCRT64
                  update: true
                  install: >-
                      mingw-w64-ucrt-x86_64-toolchain
                      mingw-w64-ucrt-x86_64-nasm
                      mingw-w64-ucrt-x86_64-pkgconf
                      make
                      git

            # ----------------------------------------------------------------
            # BUILD SHARED FFMPEG
            # ----------------------------------------------------------------
            - name: Build Shared FFmpeg (Unix)
              if: matrix.os != 'windows-latest'
              shell: bash
              run: |
                  git clone --depth 1 --branch $FFMPEG_VERSION https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
                  cd ffmpeg-src
                  ./configure \
                    --prefix=$PREFIX \
                    --enable-shared --disable-static --enable-pic --enable-small \
                    --disable-doc --disable-debug --disable-programs \
                    --disable-avdevice --disable-avfilter --disable-swscale \
                    --disable-everything \
                    --extra-ldflags="-Wl,-Bdynamic,-lssp" \
                    --enable-network --enable-zlib \
                    --enable-protocol=file,pipe,cache,http,https,tcp,tls \
                    --enable-decoder="$DECODERS" \
                    --enable-demuxer="$DEMUXERS" \
                    --enable-parser="$PARSERS" \
                    --enable-bsf="$BSFS" \
                    --enable-muxer="$MUXERS" \
                    --enable-encoder="$ENCODERS"
                  make -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
                  make install

            - name: Build Shared FFmpeg (Windows)
              if: matrix.os == 'windows-latest'
              shell: msys2 {0}
              run: |
                  export PATH="/ucrt64/bin:/usr/bin:/usr/local/bin:$PATH"
                  export PKG_CONFIG_PATH="/ucrt64/lib/pkgconfig"
                  git clone --depth 1 --branch $FFMPEG_VERSION https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
                  cd ffmpeg-src
                  ./configure \
                    --prefix=$PREFIX \
                    --arch=x86_64 --target-os=mingw32 \
                    --enable-shared --disable-static --enable-pic --enable-small \
                    --disable-doc --disable-debug --disable-programs \
                    --disable-avdevice --disable-avfilter --disable-swscale \
                    --disable-everything \
                    --extra-ldflags="-Wl,-Bdynamic,-lssp" \
                    --enable-network --enable-zlib \
                    --enable-protocol=file,pipe,cache,http,https,tcp,tls \
                    --enable-decoder="$DECODERS" \
                    --enable-demuxer="$DEMUXERS" \
                    --enable-parser="$PARSERS" \
                    --enable-bsf="$BSFS" \
                    --enable-muxer="$MUXERS" \
                    --enable-encoder="$ENCODERS"
                  make -j$(nproc)
                  make install

            # ----------------------------------------------------------------
            # STAGE AND UPLOAD ARTIFACTS
            # ----------------------------------------------------------------
            - name: Stage Shared Libraries (Unix)
              if: matrix.os != 'windows-latest'
              shell: bash
              run: |
                  mkdir -p $STAGING
                  if [ "${{ matrix.os }}" = "macos-latest" ]; then
                    cp $PREFIX/lib/libavutil*.dylib $STAGING/
                    cp $PREFIX/lib/libavformat*.dylib $STAGING/
                    cp $PREFIX/lib/libavcodec*.dylib $STAGING/
                    cp $PREFIX/lib/libswresample*.dylib $STAGING/
                    cp $PREFIX/lib/pkgconfig/*.pc $STAGING/
                    find /usr/local/lib/gcc -name "libssp*.dylib*" -exec cp {} $STAGING/ \;
                  else
                    cp $PREFIX/lib/libavutil.so* $STAGING/
                    cp $PREFIX/lib/libavformat.so* $STAGING/
                    cp $PREFIX/lib/libavcodec.so* $STAGING/
                    cp $PREFIX/lib/libswresample.so* $STAGING/
                    cp $PREFIX/lib/pkgconfig/*.pc $STAGING/
                    cp /usr/lib/x86_64-linux-gnu/libssp.so* $STAGING/
                  fi
                  echo "--- Staged Libraries ---"
                  ls -lh $STAGING/

            - name: Stage Shared Libraries (Windows)
              if: matrix.os == 'windows-latest'
              shell: msys2 {0}
              run: |
                  export PATH="/ucrt64/bin:/usr/bin:/usr/local/bin:$PATH"
                  mkdir -p $STAGING
                  find "$PREFIX" -name "avutil-*.dll" -exec cp {} $STAGING/ \;
                  find "$PREFIX" -name "avformat-*.dll" -exec cp {} $STAGING/ \;
                  find "$PREFIX" -name "avcodec-*.dll" -exec cp {} $STAGING/ \;
                  find "$PREFIX" -name "swresample-*.dll" -exec cp {} $STAGING/ \;
                  find /ucrt64/bin -name "libssp-*.dll" -exec cp {} $STAGING/ \;
                  find "$PREFIX" -name "*.pc" -exec cp {} $STAGING/ \; 2>/dev/null || true
                  echo "--- Staged Libraries ---"
                  ls -lh $STAGING/

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact-name }}
                  path: ${{ env.STAGING }}/*
