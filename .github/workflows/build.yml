name: Build All Platforms
on:
    workflow_dispatch:

env:
    FFMPEG_VERSION: n8.1
    MPV_VERSION: v0.41.0
    LIBPLACEBO_VERSION: v7.360.1
    LIBASS_VERSION: 0.17.3
    PREFIX: ${{ github.workspace }}/prefix
    MPVPREFIX: ${{ github.workspace }}/mpvprefix
    STAGING: ${{ github.workspace }}/staging
    DECODERS: aac,aac_latm,ac3,alac,ape,flac,opus,vorbis,wmav1,wmav2,wmapro,wmalossless,wmavoice,pcm_alaw,pcm_mulaw,pcm_s16le,pcm_s16be,pcm_s24le,pcm_s24be,pcm_s32le,pcm_s32be,pcm_f32le,pcm_f32be,pcm_u8,pcm_u16le,pcm_u16be,pcm_u24le,pcm_u24be,pcm_u32le,pcm_u32be,pcm_s8,dca,dsd_lsbf,dsd_msbf,dsd_lsbf_planar,dsd_msbf_planar,eac3,mlp,wavpack,tta,cook,shorten,tak,mp1,mp1float,mp2,mp2float,mp3,mp3float
    DEMUXERS: aac,ac3,aiff,ape,asf,au,flac,matroska,mov,mp3,mpc,mpc8,ogg,rm,wav,wv,dsf,tak,tta,image2,pcm_alaw,pcm_mulaw,flv
    PARSERS: aac,ac3,cook,dca,flac,mpegaudio,tak,vorbis
    BSFS: aac_adtstoasc,extract_extradata,mp3_header_decompress
    MUXERS: mp4,mov,null,wav
    ENCODERS: aac,pcm_s16le

jobs:
    build-linux:
        runs-on: ubuntu-22.04
        steps:
            # ==========================================
            # INITIALIZATION & SYSTEM DEPS
            # ==========================================
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Zig
              uses: mlugg/setup-zig@v2
              with:
                  version: 0.13.0

            - name: Install System Compilation Tools
              run: |
                  sudo apt update
                  sudo apt install -y build-essential cmake pkg-config nasm git \
                     libdbus-1-dev libx11-dev libasound2-dev libcurl4-openssl-dev \
                     libvulkan-dev libfreetype-dev libfribidi-dev libharfbuzz-dev \
                     libfontconfig-dev libgtk-3-dev libsoup2.4-dev libwebkit2gtk-4.0-dev \
                     libayatana-appindicator3-dev librsvg2-dev libfuse2 libpango1.0-dev
                  sudo ln -sf /usr/lib/x86_64-linux-gnu/libssp.so.0 /usr/lib/x86_64-linux-gnu/libssp.so

              # ==========================================
              # STEP 1: BUILD SHARED FFMPEG
            # ==========================================
            - name: Cache Shared FFmpeg Binaries
              id: cache-ffmpeg-shared
              uses: actions/cache@v4
              with:
                  path: ${{ env.PREFIX }}
                  key: ffmpeg-shared-linux-x86_64-${{ env.FFMPEG_VERSION }}

            - name: Build Shared FFmpeg
              if: steps.cache-ffmpeg-shared.outputs.cache-hit != 'true'
              run: |
                  git clone --depth 1 --branch $FFMPEG_VERSION https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
                  cd ffmpeg-src
                  ./configure \
                    --prefix=$GITHUB_WORKSPACE/dist \
                    --enable-shared \
                    --disable-static \
                    --disable-programs \
                    --disable-doc \
                    --enable-pic
                  make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
                  make install

            - name: Stage Shared Libraries (Direct to Workspace)
              run: |
                  mkdir -p $STAGING
                  cp $PREFIX/lib/libavutil.so* $STAGING/
                  cp $PREFIX/lib/libavformat.so* $STAGING/
                  cp $PREFIX/lib/libavcodec.so* $STAGING/
                  cp $PREFIX/lib/libswresample.so* $STAGING/
                  cp $PREFIX/lib/pkgconfig/*.pc $STAGING/

            # ==========================================
            # STEP 2: BUILD NATIVE SMTC & FILEDIALOG
            # ==========================================
            - name: Compile Native C++ Bindings
              run: |
                  cd package/src/smtc/linux
                  mkdir -p build

                  g++ -shared -fPIC -o build/libsmtc.so -I. smtc.cpp $(pkg-config --cflags --libs dbus-1) -std=c++11 -O2 -Wl,-soname,libsmtc.so
                  strip build/libsmtc.so

                  gcc -shared -fPIC -o build/libfiledialog.so -I. filedialog.cpp tinyfiledialogs/tinyfiledialogs.c -lX11 -O2 -D_GNU_SOURCE
                  strip build/libfiledialog.so

            # ==========================================
            # STEP 3: BUILD LIBMPV & DEPENDENCIES
            # ==========================================
            - name: Checkout mpv Core
              uses: actions/checkout@v4
              with:
                  repository: mpv-player/mpv
                  ref: ${{ env.MPV_VERSION }}
                  path: package/src/mpv

            - name: Cache Audio-Only Static FFmpeg (For libmpv Linkage)
              id: cache-mpv-ffmpeg
              uses: actions/cache@v4
              with:
                  path: ${{ env.MPVPREFIX }}
                  key: ffmpeg-static-audio-linux-${{ env.FFMPEG_VERSION }}

            - name: Build Static Audio-Only FFmpeg
              if: steps.cache-mpv-ffmpeg.outputs.cache-hit != 'true'
              run: |
                  git clone --depth 1 --branch ${{ env.FFMPEG_VERSION }} https://git.ffmpeg.org/ffmpeg.git ffmpeg-static
                  cd ffmpeg-static
                  ./configure \
                    --prefix=${{ env.MPVPREFIX }} \
                    --enable-static --disable-shared --enable-pic --enable-small \
                    --disable-doc --disable-debug --disable-programs \
                    --disable-avdevice  --disable-everything \
                    --enable-avfilter --enable-swscale --enable-network --enable-zlib --enable-openssl \
                    --enable-protocol=file,pipe,cache,http,https,tcp,tls \
                    --enable-decoder="$DECODERS" --enable-demuxer="$DEMUXERS" --enable-parser="$PARSERS" --enable-bsf="$BSFS" --enable-muxer="$MUXERS" --enable-encoder="$ENCODERS"
                  make -j$(nproc) install

            - name: setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.x"
            - name: Install Dependencies and Meson
              run: |
                  # Install system dependencies (like ninja)
                  sudo apt-get update
                  sudo apt-get install -y ninja-build

                  # Upgrade pip and install Meson >= 0.63
                  python -m pip install --upgrade pip
                  pip install "meson>=0.63"

            - name: Verify Meson Version
              run: meson --version

            - name: Build Dependency - libplacebo (Static)
              run: |
                  git clone --depth 1 --branch ${{ env.LIBPLACEBO_VERSION }} \
                    https://github.com/haasn/libplacebo.git
                  cd libplacebo
                  git submodule update --init --depth 1
                  PKG_CONFIG_PATH="${{ env.MPVPREFIX }}/lib/pkgconfig:${{ env.MPVPREFIX }}/lib/x86_64-linux-gnu/pkgconfig" \
                  meson setup build \
                    -Ddefault_library=static -Dbuildtype=release \
                    -Ddemos=false -Dtests=false -Dbench=false \
                    -Dvulkan=disabled -Dopengl=disabled -Dd3d11=disabled \
                    --prefix ${{ env.MPVPREFIX }}
                  meson install -C build

            - name: Build Dependency - libass (Static)
              run: |
                  git clone --depth 1 --branch ${{ env.LIBASS_VERSION }} \
                    https://github.com/libass/libass.git
                  cd libass
                  PKG_CONFIG_PATH="${{ env.MPVPREFIX }}/lib/pkgconfig:${{ env.MPVPREFIX }}/lib/x86_64-linux-gnu/pkgconfig" \
                  meson setup build \
                    -Ddefault_library=static -Dbuildtype=release \
                    -Dfontconfig=disabled -Drequire-system-font-provider=false \
                    --prefix ${{ env.MPVPREFIX }}
                  meson install -C build

            - name: Build libmpv (Shared)
              run: |
                  cd package/src/mpv
                  PKG_CONFIG_PATH="${{ env.MPVPREFIX }}/lib/pkgconfig:${{ env.MPVPREFIX }}/lib/x86_64-linux-gnu/pkgconfig" \
                  meson setup build \
                    -Dcplayer=false -Dlibmpv=true \
                    -Ddefault_library=shared -Dbuildtype=release \
                    -Dbuild-date=false -Dgpl=false \
                    -Dlua=disabled -Djavascript=disabled -Dcplugins=disabled \
                    -Dalsa=enabled \
                    -Dgl=disabled -Dvulkan=disabled -Degl=disabled \
                    -Dx11=disabled -Dwayland=disabled -Ddrm=disabled -Dgbm=disabled \
                    -Dvdpau=disabled -Dvaapi=disabled -Dcuda-hwaccel=disabled \
                    -Dlcms2=disabled -Dzimg=disabled -Djpeg=disabled \
                    -Dlibarchive=disabled -Drubberband=disabled \
                    -Dcdda=disabled -Ddvdnav=disabled -Dlibbluray=disabled \
                    -Duchardet=disabled -Dvapoursynth=disabled \
                    -Diconv=disabled -Dzlib=disabled \
                    -Dpulse=disabled -Dpipewire=disabled -Djack=disabled \
                    -Doss-audio=disabled -Dsndio=disabled -Dopenal=disabled \
                    -Dsdl2-video=disabled -Dsdl2-audio=disabled -Dsdl2-gamepad=disabled \
                    -Dcaca=disabled -Dsixel=disabled \
                    -Dmanpage-build=disabled -Dtests=false \
                    -Dc_args='-ffunction-sections -fdata-sections' \
                     -Dc_link_args='-Wl,--gc-sections -Wl,--as-needed -lstdc++'
                  meson compile -C build
                  strip build/libmpv.so
                  ls -lh build/libmpv.so

            # ==========================================
            # STEP 4: COMPILE ELECTROBUN APPLICATION
            # ==========================================
            - name: Setup Bun Cache
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('package/bun.lockb', 'package/package.json') }}
                  restore-keys: ${{ runner.os }}-bun-

            - name: Setup Bun Engine Environment
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install Package Bundles
              run: |
                  cd package
                  bun install

            - name: Setup Custom Script Toolchain Cache
              uses: actions/cache@v4
              with:
                  path: ${{ github.workspace }}/package/vendors/binaries
                  key: ${{ runner.os }}-script-deps-${{ hashFiles('package/build.ts') }}
                  restore-keys: ${{ runner.os }}-script-deps-

            - name: Compile and Release Asset Bundle
              env:
                  PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
              run: |
                  cd package
                  bun build.ts --release
            - name: Upload Completed Package Folder
              uses: actions/upload-artifact@v4
              with:
                  name: electrobun-linux-x86_64
                  path: package/dist-linux-x64/
                  if-no-files-found: error

    build-macos:
        runs-on: macos-latest
        steps:
            # ==========================================
            # INITIALIZATION & SYSTEM DEPS
            # ==========================================
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Zig
              uses: mlugg/setup-zig@v2
              with:
                  version: 0.13.0

            - name: Setup Homebrew Cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/Library/Caches/Homebrew
                      /usr/local/Homebrew
                  key: ${{ runner.os }}-brew-${{ hashFiles('**/package.json') }}
                  restore-keys: ${{ runner.os }}-brew-

            - name: Install System Compilation Tools
              run: |
                  brew update
                  brew install meson ninja pkg-config nasm cmake \
                    openssl@3 zlib curl vulkan-headers \
                    fribidi harfbuzz gcc
                  pip3 install --break-system-packages jinja2

            # ==========================================
            # STEP 1: BUILD SHARED FFMPEG
            # ==========================================
            - name: Cache Shared FFmpeg Binaries
              id: cache-ffmpeg-shared
              uses: actions/cache@v4
              with:
                  path: ${{ env.PREFIX }}
                  key: ffmpeg-shared-macos-x86_64-${{ env.FFMPEG_VERSION }}

            - name: Build Shared FFmpeg
              if: steps.cache-ffmpeg-shared.outputs.cache-hit != 'true'
              run: |
                  git clone --depth 1 --branch $FFMPEG_VERSION https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
                  cd ffmpeg-src
                  ./configure \
                    --prefix=$PREFIX \
                    --enable-shared \
                    --disable-static \
                    --disable-programs \
                    --disable-doc \
                    --enable-pic
                  make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
                  make install

            - name: Stage Shared Libraries (Direct to Workspace)
              run: |
                  mkdir -p $STAGING
                  cp $PREFIX/lib/libavutil*.dylib $STAGING/
                  cp $PREFIX/lib/libavformat*.dylib $STAGING/
                  cp $PREFIX/lib/libavcodec*.dylib $STAGING/
                  cp $PREFIX/lib/libswresample*.dylib $STAGING/
                  cp $PREFIX/lib/pkgconfig/*.pc $STAGING/
                  find /usr/local/lib/gcc -name "libssp*.dylib*" -exec cp {} $STAGING/ \;
                  ls -lh $STAGING/

            # ==========================================
            # STEP 2: BUILD NATIVE SMTC & FILEDIALOG
            # ==========================================
            - name: Compile Native Obj-C++ Bindings
              run: |
                  cd package/src/smtc/macos
                  mkdir -p build

                  clang++ -shared -fPIC -o build/libsmtc.dylib smtc.mm \
                    -framework MediaPlayer -framework AppKit -framework Cocoa \
                    -std=c++11 -O2 -ObjC++
                  strip -S build/libsmtc.dylib

                  clang++ -shared -fPIC -o build/libfiledialog.dylib filedialog.mm \
                    -framework AppKit -framework Cocoa \
                    -std=c++11 -O2 -ObjC++
                  strip -S build/libfiledialog.dylib

            # ==========================================
            # STEP 3: BUILD LIBMPV & DEPENDENCIES
            # ==========================================
            - name: Checkout mpv Core
              uses: actions/checkout@v4
              with:
                  repository: mpv-player/mpv
                  ref: ${{ env.MPV_VERSION }}
                  path: package/src/mpv

            - name: Cache Audio-Only Static FFmpeg (For libmpv Linkage)
              id: cache-mpv-ffmpeg
              uses: actions/cache@v4
              with:
                  path: ${{ env.MPVPREFIX }}
                  key: ffmpeg-static-audio-macos-${{ env.FFMPEG_VERSION }}

            - name: Build Static Audio-Only FFmpeg
              if: steps.cache-mpv-ffmpeg.outputs.cache-hit != 'true'
              run: |
                  git clone --depth 1 --branch ${{ env.FFMPEG_VERSION }} https://git.ffmpeg.org/ffmpeg.git ffmpeg-static
                  cd ffmpeg-static
                  export PKG_CONFIG_PATH="$(brew --prefix zlib)/lib/pkgconfig:$(brew --prefix openssl@3)/lib/pkgconfig:$PKG_CONFIG_PATH"
                  ./configure \
                    --prefix=${{ env.MPVPREFIX }} \
                    --enable-static --disable-shared --enable-pic --enable-small \
                    --disable-doc --disable-debug --disable-programs \
                    --disable-avdevice  --disable-everything \
                    --enable-avfilter --enable-swscale --enable-network --enable-zlib --enable-openssl \
                    --enable-protocol=file,pipe,cache,http,https,tcp,tls \
                    --enable-decoder="$DECODERS" --enable-demuxer="$DEMUXERS" --enable-parser="$PARSERS" --enable-bsf="$BSFS" --enable-muxer="$MUXERS" --enable-encoder="$ENCODERS"
                  make -j$(sysctl -n hw.logicalcpu) install

            - name: Build Dependency - libplacebo (Static)
              run: |
                  git clone --depth 1 --branch ${{ env.LIBPLACEBO_VERSION }} \
                    https://github.com/haasn/libplacebo.git
                  cd libplacebo
                  git submodule update --init --depth 1
                  meson setup build \
                    -Ddefault_library=static -Dbuildtype=release \
                    -Ddemos=false -Dtests=false -Dbench=false \
                    -Dvulkan=disabled -Dopengl=disabled -Dd3d11=disabled \
                    --prefix ${{ env.MPVPREFIX }}
                  meson install -C build

            - name: Build Dependency - libass (Static)
              run: |
                  git clone --depth 1 --branch ${{ env.LIBASS_VERSION }} \
                    https://github.com/libass/libass.git
                  cd libass
                  meson setup build \
                    -Ddefault_library=static -Dbuildtype=release \
                    -Dfontconfig=disabled \
                    --prefix ${{ env.MPVPREFIX }}
                  meson install -C build

            - name: Build libmpv (Shared)
              run: |
                  cd package/src/mpv
                  PKG_CONFIG_PATH=${{ env.MPVPREFIX }}/lib/pkgconfig \
                  meson setup build \
                    -Dcplayer=false -Dlibmpv=true \
                    -Ddefault_library=shared -Dbuildtype=release \
                    -Dbuild-date=false -Dgpl=false \
                    -Dlua=disabled -Djavascript=disabled -Dcplugins=disabled \
                    -Dcoreaudio=enabled \
                    -Dcocoa=disabled -Dswift-build=disabled \
                    -Dmacos-cocoa-cb=disabled -Dmacos-media-player=disabled \
                    -Dmacos-touchbar=disabled \
                    -Dgl=disabled -Dvulkan=disabled \
                    -Dvideotoolbox-gl=disabled -Dvideotoolbox-pl=disabled \
                    -Dios-gl=disabled \
                    -Dlcms2=disabled -Dzimg=disabled -Djpeg=disabled \
                    -Dlibarchive=disabled -Drubberband=disabled \
                    -Dcdda=disabled -Ddvdnav=disabled -Dlibbluray=disabled \
                    -Duchardet=disabled -Dvapoursynth=disabled \
                    -Diconv=disabled -Dzlib=disabled \
                    -Dalsa=disabled -Dpulse=disabled -Dpipewire=disabled \
                    -Djack=disabled -Dopenal=disabled \
                    -Dsdl2-video=disabled -Dsdl2-audio=disabled \
                    -Dmanpage-build=disabled -Dtests=false \
                    -Dc_args='-ffunction-sections -fdata-sections' \
                     -Dc_link_args='-Wl,-dead_strip'
                  meson compile -C build
                  strip -S build/libmpv.dylib
                  ls -lh build/libmpv.dylib

            # ==========================================
            # STEP 4: COMPILE ELECTROBUN APPLICATION
            # ==========================================
            - name: Setup Bun Cache
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('package/bun.lockb', 'package/package.json') }}
                  restore-keys: ${{ runner.os }}-bun-

            - name: Setup Bun Engine Environment
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install Package Bundles
              run: |
                  cd package
                  bun install

            - name: Setup Custom Script Toolchain Cache
              uses: actions/cache@v4
              with:
                  path: ${{ github.workspace }}/package/vendors/binaries
                  key: ${{ runner.os }}-script-deps-${{ hashFiles('package/build.ts') }}
                  restore-keys: ${{ runner.os }}-script-deps-

            - name: Compile and Release Asset Bundle
              run: |
                  cd package
                  bun build.ts --release

            - name: Upload Completed Package Folder
              uses: actions/upload-artifact@v4
              with:
                  name: electrobun-macos-x86_64
                  path: package/dist-${{runner.os}}-${{runner.arch}}/
                  if-no-files-found: error

    build-windows:
        needs: build-macos
        runs-on: windows-latest
        steps:
            # ==========================================
            # INITIALIZATION & SYSTEM DEPS
            # ==========================================
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Zig
              uses: mlugg/setup-zig@v2
              with:
                  version: 0.13.0

            - name: Setup MSYS2 Environment
              uses: msys2/setup-msys2@v2
              with:
                  msystem: UCRT64
                  update: true
                  install: >-
                      mingw-w64-ucrt-x86_64-toolchain
                      mingw-w64-ucrt-x86_64-meson
                      mingw-w64-ucrt-x86_64-ninja
                      mingw-w64-ucrt-x86_64-pkgconf
                      mingw-w64-ucrt-x86_64-nasm
                      mingw-w64-ucrt-x86_64-openssl
                      mingw-w64-ucrt-x86_64-zlib
                      mingw-w64-ucrt-x86_64-fribidi
                      mingw-w64-ucrt-x86_64-harfbuzz
                      make
                      diffutils
                      git

            # ==========================================
            # STEP 1: BUILD SHARED FFMPEG
            # ==========================================
            - name: Cache Shared FFmpeg Binaries
              id: cache-ffmpeg-shared
              uses: actions/cache@v4
              with:
                  path: ${{ env.PREFIX }}
                  key: ffmpeg-shared-windows-x86_64-${{ env.FFMPEG_VERSION }}-test

            - name: Build Shared FFmpeg
              if: steps.cache-ffmpeg-shared.outputs.cache-hit != 'true'
              shell: msys2 {0}
              run: |
                  export PATH="/ucrt64/bin:/usr/bin:/usr/local/bin:$PATH"
                  export PKG_CONFIG_PATH="/ucrt64/lib/pkgconfig"
                  git clone --depth 1 --branch $FFMPEG_VERSION https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
                  export PATH="/ucrt64/bin:/usr/bin:$PATH"

                  export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
                  ccache --max-size=500M

                  CORES=${NUMBER_OF_PROCESSORS:-4}
                  echo "Building with $CORES threads..."

                  cd ffmpeg-src
                  ./configure \
                    --prefix=$PREFIX \
                    --enable-shared \
                    --disable-static \
                    --disable-programs \
                    --disable-doc

                  make -j$CORES
                  make install

            - name: Stage Shared Libraries (Direct to Workspace)
              shell: msys2 {0}
              run: |
                  export PATH="/ucrt64/bin:/usr/bin:/usr/local/bin:$PATH"
                  mkdir -p $STAGING
                  find "$PREFIX" -name "avutil-*.dll" -exec cp {} $STAGING/ \;
                  find "$PREFIX" -name "avformat-*.dll" -exec cp {} $STAGING/ \;
                  find "$PREFIX" -name "avcodec-*.dll" -exec cp {} $STAGING/ \;
                  find "$PREFIX" -name "swresample-*.dll" -exec cp {} $STAGING/ \;

                  echo "Caching GCC UCRT64 Runtime library package..."
                  pacman -Sw --noconfirm mingw-w64-ucrt-x86_64-gcc-libs
                  PKG_FILE=$(ls /var/cache/pacman/pkg/mingw-w64-ucrt-x86_64-gcc-libs-*.pkg.tar.zst | head -n 1)
                  if [ -n "$PKG_FILE" ]; then
                    echo "Extracting package file: $PKG_FILE"
                    tar -xf "$PKG_FILE"
                    
                    # Search inside the modern UCRT tree structure safely and copy directly to the workspace folder
                    if [ -f "ucrt64/bin/libssp-0.dll" ]; then
                      echo "Successfully found libssp-0.dll in ucrt64! Copying to bundle..."
                      cp ucrt64/bin/libssp-0.dll "$GITHUB_WORKSPACE/final-bundle/"
                    elif [ -f "mingw64/bin/libssp-0.dll" ]; then
                      echo "Successfully found libssp-0.dll in mingw64! Copying to bundle..."
                      cp mingw64/bin/libssp-0.dll "$GITHUB_WORKSPACE/final-bundle/"
                    else
                      echo "libssp-0.dll is missing in GCC 16+ package tree. Pulling standalone fallback for Bun..."
                      curl -Lo "$GITHUB_WORKSPACE/final-bundle/libssp-0.dll" https://raw.githubusercontent.com/brechtsanders/winlibs_mingw/master/libssp-0.dll || \
                      curl -Lo "$GITHUB_WORKSPACE/final-bundle/libssp-0.dll" https://github.com/vort/mpv-win32-deps/raw/master/shared/libssp-0.dll
                    fi
                  else
                    echo "Error: Could not locate the downloaded pacman archive package file."
                    exit 1
                  fi

                  ls -lh $STAGING/

            # ==========================================
            # STEP 2: BUILD NATIVE SMTC & FILEDIALOG (MSVC)
            # ==========================================
            - name: Setup MSVC Toolchain
              uses: ilammy/msvc-dev-cmd@v1

            - name: Compile Native C++ Bindings (MSVC)
              shell: cmd
              run: |
                  cd package\src\smtc\win
                  if not exist build mkdir build
                  cd build

                  cl /nologo /LD /EHsc /std:c++17 /O2 ..\smtc.cpp /link /out:smtc.dll windowsapp.lib
                  cl /nologo /LD /EHsc /std:c++17 /O2 ..\filedialog.cpp /link /out:filedialog.dll ole32.lib shell32.lib
                  cl /nologo /LD /EHsc /std:c++17 /O2 ..\aumid.cpp /link /out:aumid.dll ole32.lib shell32.lib

            # ==========================================
            # STEP 3: BUILD LIBMPV & DEPENDENCIES
            # ==========================================
            - name: Checkout mpv Core
              uses: actions/checkout@v4
              with:
                  repository: mpv-player/mpv
                  ref: ${{ env.MPV_VERSION }}
                  path: package/src/mpv

            - name: Cache Audio-Only Static FFmpeg (For libmpv Linkage)
              id: cache-mpv-ffmpeg
              uses: actions/cache@v4
              with:
                  path: ${{ env.MPVPREFIX }}
                  key: ffmpeg-static-audio-windows-${{ env.FFMPEG_VERSION }}

            - name: Build Static Audio-Only FFmpeg
              if: steps.cache-mpv-ffmpeg.outputs.cache-hit != 'true'
              shell: msys2 {0}
              run: |
                  MPVPREFIX_PATH="$(cygpath -u '${{ env.MPVPREFIX }}')"
                  git clone --depth 1 --branch ${{ env.FFMPEG_VERSION }} https://git.ffmpeg.org/ffmpeg.git ffmpeg-static
                  cd ffmpeg-static
                  ./configure \
                    --prefix=$MPVPREFIX_PATH \
                    --arch=x86_64 --target-os=mingw32 \
                    --enable-static --disable-shared --enable-pic --enable-small \
                    --disable-doc --disable-debug --disable-programs \
                    --disable-avdevice  --disable-everything \
                    --enable-avfilter --enable-swscale --enable-network --enable-zlib --enable-openssl \
                    --enable-protocol=file,pipe,cache,http,https,tcp,tls \
                    --enable-decoder="$DECODERS" --enable-demuxer="$DEMUXERS" --enable-parser="$PARSERS" --enable-bsf="$BSFS" --enable-muxer="$MUXERS" --enable-encoder="$ENCODERS"
                  make -j$(nproc) install

            - name: Build Dependency - libplacebo (Static)
              shell: msys2 {0}
              run: |
                  MPVPREFIX_PATH="$(cygpath -u '${{ env.MPVPREFIX }}')"
                  git clone --depth 1 --branch ${{ env.LIBPLACEBO_VERSION }} https://github.com/haasn/libplacebo.git
                  cd libplacebo
                  git submodule update --init --depth 1
                  meson setup build \
                    -Ddefault_library=static -Dbuildtype=release \
                    -Ddemos=false -Dtests=false -Dbench=false \
                    -Dvulkan=disabled -Dopengl=disabled -Dd3d11=disabled \
                    --prefix $MPVPREFIX_PATH
                  meson install -C build

            - name: Build Dependency - libass (Static)
              shell: msys2 {0}
              run: |
                  MPVPREFIX_PATH="$(cygpath -u '${{ env.MPVPREFIX }}')"
                  git clone --depth 1 --branch ${{ env.LIBASS_VERSION }} https://github.com/libass/libass.git
                  cd libass
                  meson setup build \
                    -Ddefault_library=static -Dbuildtype=release \
                    -Dfontconfig=disabled \
                    --prefix $MPVPREFIX_PATH
                  meson install -C build

            - name: Build libmpv (Shared)
              shell: msys2 {0}
              run: |
                  MPVPREFIX_PATH="$(cygpath -u '${{ env.MPVPREFIX }}')"
                  cd package/src/mpv
                  PKG_CONFIG_PATH=$MPVPREFIX_PATH/lib/pkgconfig \
                  meson setup build \
                    -Dcplayer=false -Dlibmpv=true \
                    -Ddefault_library=shared -Dbuildtype=release \
                    -Dbuild-date=false -Dgpl=false \
                    -Dlua=disabled -Djavascript=disabled -Dcplugins=disabled \
                    -Dwasapi=enabled -Dwin32-smtc=disabled \
                    -Dgl=disabled -Dvulkan=disabled -Degl=disabled \
                    -Degl-angle=disabled -Dshaderc=disabled -Dspirv-cross=disabled \
                    -Dd3d11=disabled -Ddirect3d=disabled \
                    -Dcuda-hwaccel=disabled -Dd3d-hwaccel=disabled \
                    -Dlcms2=disabled -Dzimg=disabled -Djpeg=disabled \
                    -Dlibarchive=disabled -Drubberband=disabled \
                    -Dcdda=disabled -Ddvdnav=disabled -Dlibbluray=disabled \
                    -Duchardet=disabled -Dvapoursynth=disabled \
                    -Diconv=disabled -Dzlib=disabled \
                    -Dcaca=disabled \
                    -Dmanpage-build=disabled -Dtests=false \
                    -Dc_args='-ffunction-sections -fdata-sections' \
                     -Dc_link_args='-Wl,--gc-sections -lstdc++'
                  meson compile -C build
                  strip build/libmpv-2.dll
                  ls -lh build/libmpv-2.dll
                  cp build/libmpv-2.dll build/libmpv.dll

            # ==========================================
            # STEP 4: COMPILE ELECTROBUN APPLICATION
            # ==========================================
            - name: Setup NuGet Cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.nuget/packages
                      ${{ github.workspace }}/package/vendors/webview2
                  key: ${{ runner.os }}-nuget-${{ hashFiles('**/package.json') }}
                  restore-keys: ${{ runner.os }}-nuget-

            - name: Setup Bun Cache
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('package/bun.lockb', 'package/package.json') }}
                  restore-keys: ${{ runner.os }}-bun-

            - name: Setup Bun Engine Environment
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install Package Bundles
              run: |
                  cd package
                  bun install

            - name: Setup Custom Script Toolchain Cache
              uses: actions/cache@v4
              with:
                  path: package/vendors
                  key: ${{ runner.os }}-script-deps-${{ hashFiles('package/build.ts') }}
                  restore-keys: ${{ runner.os }}-script-deps-

            - name: Compile and Release Asset Bundle
              run: |
                  cd package
                  bun build.ts --release

            - name: Upload Completed Package Folder
              uses: actions/upload-artifact@v4
              with:
                  name: electrobun-windows-x86_64
                  path: package/dist-win-x64/
                  if-no-files-found: error
