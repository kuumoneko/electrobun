name: Build All Platforms
on: [push, pull_request, workflow_dispatch]

jobs:
    build-macos:
        runs-on: macos-latest
        defaults:
            run:
                working-directory: package
        steps:
            - uses: actions/checkout@v4
            - run: brew install cmake pkg-config
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - run: bun install

            - run: bun test.ts --release
    build-debian:
        needs: build-macos
        runs-on: debian-latest
        defaults:
            run:
                working-directory: package
        steps:
            - uses: actions/checkout@v4
            - run: |
                  sudo apt update
                  sudo apt install -y build-essential cmake pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev libfuse2
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - run: bun install

            - run: bun test.ts --release
    build-windows:
        needs: build-debian
        runs-on: windows-latest
        defaults:
            run:
                working-directory: package
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - run: bun install

            - run: bun test.ts --release
