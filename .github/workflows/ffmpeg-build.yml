name: Build FFmpeg 8.x Shared Libraries

on:
    workflow_dispatch:

jobs:
    build:
        name: Build on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-22.04
                      artifact-name: ffmpeg-shared-linux
                    - os: macos-latest
                      artifact-name: ffmpeg-shared-macos
                    - os: windows-latest
                      artifact-name: ffmpeg-shared-windows

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Disable Windows Defender
              if: matrix.os == 'windows-latest'
              run: Set-MpPreference -DisableRealtimeMonitoring $true
              shell: powershell

            # ----------------------------------------------------------------
            # ENVIRONMENT SETUP
            # ----------------------------------------------------------------
            - name: Install Dependencies (Linux)
              if: matrix.os == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential yasm nasm pkg-config

            - name: Install Dependencies (macOS)
              if: matrix.os == 'macos-latest'
              run: |
                  brew install yasm nasm pkg-config

            - name: Install Dependencies (Windows via MSYS2)
              if: matrix.os == 'windows-latest'
              uses: msys2/setup-msys2@v2
              with:
                  msystem: UCRT64
                  update: false
                  path-type: inherit
                  install: >-
                      mingw-w64-ucrt-x86_64-toolchain
                      mingw-w64-ucrt-x86_64-yasm
                      mingw-w64-ucrt-x86_64-nasm
                      base-devel
                      git

            # ----------------------------------------------------------------
            # FETCH SOURCE CODE
            # ----------------------------------------------------------------
            - name: Clone FFmpeg (Branch 8.0)
              shell: bash
              run: |
                  git clone --depth 1 --branch release/8.0 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src

            # ----------------------------------------------------------------
            # COMPILATION STEP
            # ----------------------------------------------------------------
            - name: Build FFmpeg (Unix-like)
              if: matrix.os != 'windows-latest'
              shell: bash
              run: |
                  cd ffmpeg-src
                  ./configure \
                    --prefix=$GITHUB_WORKSPACE/dist \
                    --enable-shared \
                    --disable-static \
                    --disable-programs \
                    --disable-doc \
                    --enable-pic
                  make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
                  make install

            - name: Setup Compiler Cache (Windows MSYS2)
              if: matrix.os == 'windows-latest'
              uses: actions/cache@v4
              with:
                  path: .ccache
                  key: ${{ runner.os }}-ffmpeg-ccache-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-ffmpeg-ccache-

            - name: Build FFmpeg (Windows MSYS2)
              if: matrix.os == 'windows-latest'
              shell: msys2 {0}
              run: |
                  export PATH="/ucrt64/bin:/usr/bin:$PATH"

                  export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
                  ccache --max-size=500M

                  CORES=${NUMBER_OF_PROCESSORS:-4}
                  echo "Building with $CORES threads..."

                  cd ffmpeg-src
                  ./configure \
                    --prefix=$GITHUB_WORKSPACE/dist \
                    --enable-shared \
                    --disable-static \
                    --disable-programs \
                    --disable-doc

                  make -j$CORES
                  make install

            # ----------------------------------------------------------------
            # ORGANIZE AND VERIFY ARTIFACTS
            # ----------------------------------------------------------------
            - name: Prepare Artifacts Bundle (Windows)
              if: matrix.os == 'windows-latest'
              shell: msys2 {0}
              run: |
                  # Create the folder directly in the root workspace
                  mkdir -p "$GITHUB_WORKSPACE/final-bundle"
                    
                  # 1. Copy our compiled FFmpeg DLL files directly into it
                  cp "$GITHUB_WORKSPACE/dist/bin"/*.dll "$GITHUB_WORKSPACE/final-bundle/" || true
                    
                  # 2. Get the correct UCRT64 runtime libs package via pacman
                  echo "Caching GCC UCRT64 Runtime library package..."
                  pacman -Sw --noconfirm mingw-w64-ucrt-x86_64-gcc-libs
                    
                  echo "Locating and extracting the downloaded archive package..."
                  PKG_FILE=$(ls /var/cache/pacman/pkg/mingw-w64-ucrt-x86_64-gcc-libs-*.pkg.tar.zst | head -n 1)
                    
                  if [ -n "$PKG_FILE" ]; then
                    echo "Extracting package file: $PKG_FILE"
                    tar -xf "$PKG_FILE"
                    
                    # Search inside the modern UCRT tree structure safely and copy directly to the workspace folder
                    if [ -f "ucrt64/bin/libssp-0.dll" ]; then
                      echo "Successfully found libssp-0.dll in ucrt64! Copying to bundle..."
                      cp ucrt64/bin/libssp-0.dll "$GITHUB_WORKSPACE/final-bundle/"
                    elif [ -f "mingw64/bin/libssp-0.dll" ]; then
                      echo "Successfully found libssp-0.dll in mingw64! Copying to bundle..."
                      cp mingw64/bin/libssp-0.dll "$GITHUB_WORKSPACE/final-bundle/"
                    else
                      echo "libssp-0.dll is missing in GCC 16+ package tree. Pulling standalone fallback for Bun..."
                      curl -Lo "$GITHUB_WORKSPACE/final-bundle/libssp-0.dll" https://raw.githubusercontent.com/brechtsanders/winlibs_mingw/master/libssp-0.dll || \
                      curl -Lo "$GITHUB_WORKSPACE/final-bundle/libssp-0.dll" https://github.com/vort/mpv-win32-deps/raw/master/shared/libssp-0.dll
                    fi
                  else
                    echo "Error: Could not locate the downloaded pacman archive package file."
                    exit 1
                  fi
                    
                  echo "--- Final Captured Binaries ---"
                  ls -la "$GITHUB_WORKSPACE/final-bundle"

            - name: Prepare Artifacts Bundle (Unix-like)
              if: matrix.os != 'windows-latest'
              shell: bash
              run: |
                  mkdir -p final-bundle
                  if [ "${{ matrix.os }}" = "macos-latest" ]; then
                    cp dist/lib/*.dylib final-bundle/ || true
                  else
                    cp dist/lib/*.so* final-bundle/ || true
                  fi
                    
                  echo "--- Final Captured Binaries ---"
                  ls -la final-bundle

            - name: Upload Build Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact-name }}
                  path: final-bundle/
