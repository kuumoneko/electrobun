name: Consolidated Linux Build Pipeline

on:
    push:
        branches: [main]
    workflow_dispatch:

env:
    FFMPEG_VERSION: n7.1
    MPV_VERSION: v0.39.0
    LIBPLACEBO_VERSION: v7.349.0
    LIBASS_VERSION: 0.17.3
    PREFIX: ${{ github.workspace }}/prefix
    MPVPREFIX: ${{ github.workspace }}/mpvprefix
    STAGING: ${{ github.workspace }}/staging
    DECODERS: aac,aac_latm,ac3,alac,ape,flac,opus,vorbis,wmav1,wmav2,wmapro,wmalossless,wmavoice,pcm_alaw,pcm_mulaw,pcm_s16le,pcm_s16be,pcm_s24le,pcm_s24be,pcm_s32le,pcm_s32be,pcm_f32le,pcm_f32be,pcm_u8,pcm_u16le,pcm_u16be,pcm_u24le,pcm_u24be,pcm_u32le,pcm_u32be,pcm_s8,dca,dsd_lsbf,dsd_msbf,dsd_lsbf_planar,dsd_msbf_planar,eac3,mlp,wavpack,tta,cook,shorten,tak,mp1,mp1float,mp2,mp2float,mp3,mp3float
    DEMUXERS: aac,ac3,aiff,ape,asf,au,flac,matroska,mov,mp3,mpc,mpc8,ogg,rm,wav,wv,dsf,tak,tta,image2,pcm_alaw,pcm_mulaw,flv
    PARSERS: aac,ac3,cook,dca,flac,mpegaudio,tak,vorbis
    BSFS: aac_adtstoasc,extract_extradata,mp3_header_decompress
    MUXERS: mp4,mov,null,wav
    ENCODERS: aac,pcm_s16le

jobs:
    # Phase 1: Build the global shared FFmpeg libraries
    build-ffmpeg-shared:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install System Utilities
              run: |
                  sudo apt update
                  sudo apt install -y nasm pkg-config git

            - name: Cache Shared FFmpeg Binaries
              id: cache-ffmpeg-shared
              uses: actions/cache@v4
              with:
                  path: ${{ env.PREFIX }}
                  key: ffmpeg-shared-linux-x86_64-${{ env.FFMPEG_VERSION }}

            - name: Build Shared FFmpeg
              if: steps.cache-ffmpeg-shared.outputs.cache-hit != 'true'
              run: |
                  git clone --depth 1 --branch $FFMPEG_VERSION https://git.ffmpeg.org/ffmpeg.git ffmpeg-src
                  cd ffmpeg-src
                  ./configure \
                    --prefix=$PREFIX \
                    --enable-shared --disable-static --enable-pic --enable-small \
                    --disable-doc --disable-debug --disable-programs \
                    --disable-avdevice --disable-avfilter --disable-swscale \
                    --disable-postproc --disable-everything \
                    --enable-network --enable-zlib \
                    --enable-protocol=file,pipe,cache,http,https,tcp,tls \
                    --enable-decoder="$DECODERS" \
                    --enable-demuxer="$DEMUXERS" \
                    --enable-parser="$PARSERS" \
                    --enable-bsf="$BSFS" \
                    --enable-muxer="$MUXERS" \
                    --enable-encoder="$ENCODERS"
                  make -j$(nproc)
                  make install

            - name: Stage Shared Libraries
              run: |
                  mkdir -p $STAGING
                  cp $PREFIX/lib/libavutil.so* $STAGING/
                  cp $PREFIX/lib/libavformat.so* $STAGING/
                  cp $PREFIX/lib/libavcodec.so* $STAGING/
                  cp $PREFIX/lib/libswresample.so* $STAGING/
                  cp $PREFIX/lib/pkgconfig/*.pc $STAGING/

            - name: Upload Shared FFmpeg Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ffmpeg-shared-linux-x86_64
                  path: ${{ env.STAGING }}/*

    # Phase 2: Build Native SMTC and FileDialog C++ Bindings
    build-smtc-native:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: package
        steps:
            - uses: actions/checkout@v4

            - name: Install Native Toolchain Dependencies
              run: |
                  sudo apt update
                  sudo apt install -y libdbus-1-dev libx11-dev build-essential

            - name: Compile libsmtc and libfiledialog
              run: |
                  cd src/smtc/linux
                  mkdir -p build

                  # Build SMTC Binding
                  g++ -shared -fPIC -o build/libsmtc.so \
                    -I. smtc.cpp \
                    $(pkg-config --cflags --libs dbus-1) \
                    -std=c++11 -O2 \
                    -Wl,-soname,libsmtc.so
                  strip build/libsmtc.so

                  # Build File Dialog Binding
                  gcc -shared -fPIC -o build/libfiledialog.so \
                    -I. filedialog.cpp \
                    tinyfiledialogs/tinyfiledialogs.c \
                    -lX11 -O2 -D_GNU_SOURCE
                  strip build/libfiledialog.so

            - name: Upload Native Component Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: smtc-linux-x86_64
                  path: |
                      src/smtc/build/libsmtc.so
                      src/smtc/build/libfiledialog.so

    # Phase 3: Build libmpv (Dependencies compiled statically, libmpv bundled shared)
    build-libmpv:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: package
        steps:
            - name: Checkout mpv Core
              uses: actions/checkout@v4
              with:
                  repository: mpv-player/mpv
                  ref: ${{ env.MPV_VERSION }}
                  path: mpv

            - name: Install System Compilation Dependencies
              run: |
                  sudo apt update
                  sudo apt install -y meson ninja-build pkg-config nasm git \
                     libasound2-dev libcurl4-openssl-dev libvulkan-dev \
                     libfreetype-dev libfribidi-dev libharfbuzz-dev \
                     libfontconfig-dev

            - name: Cache Audio-Only Static FFmpeg (For libmpv Linkage)
              id: cache-mpv-ffmpeg
              uses: actions/cache@v4
              with:
                  path: ${{ env.MPVPREFIX }}
                  key: ffmpeg-static-audio-linux-${{ env.FFMPEG_VERSION }}

            - name: Build Static Audio-Only FFmpeg
              if: steps.cache-mpv-ffmpeg.outputs.cache-hit != 'true'
              run: |
                  git clone --depth 1 --branch ${{ env.FFMPEG_VERSION }} https://git.ffmpeg.org/ffmpeg.git ffmpeg-static
                  cd src/mpv/ffmpeg
                  ./configure \
                    --prefix=${{ env.MPVPREFIX }} \
                    --enable-static --disable-shared --enable-pic --enable-small \
                    --disable-doc --disable-debug --disable-programs \
                    --disable-avdevice \
                    --disable-postproc --disable-everything \
                    --enable-avfilter --enable-swscale \
                    --enable-network --enable-zlib --enable-openssl \
                    --enable-protocol=file,pipe,cache,http,https,tcp,tls \
                    --enable-decoder=aac,aac_latm,ac3,alac,ape,flac,opus,vorbis,wmav1,wmav2,wmapro,wmalossless,wmavoice,pcm_alaw,pcm_mulaw,pcm_s16le,pcm_s16be,pcm_s24le,pcm_s24be,pcm_s32le,pcm_s32be,pcm_f32le,pcm_f32be,pcm_u8,pcm_u16le,pcm_u16be,pcm_u24le,pcm_u24be,pcm_u32le,pcm_u32be,pcm_s8,dca,dsd_lsbf,dsd_msbf,dsd_lsbf_planar,dsd_msbf_planar,eac3,mlp,wavpack,tta,cook,shorten,tak,mp1,mp1float,mp2,mp2float,mp3,mp3float \
                    --enable-demuxer=aac,ac3,aiff,ape,asf,au,flac,matroska,mov,mp3,mpc,mpc8,ogg,rm,wav,wv,dsf,tak,tta,image2,pcm_alaw,pcm_mulaw,flv \
                    --enable-parser=aac,ac3,cook,dca,flac,mpegaudio,tak,vorbis \
                    --enable-bsf=aac_adtstoasc,extract_extradata,mp3_header_decompress \
                    --enable-muxer=null,wav --enable-encoder=pcm_s16le
                  make -j$(nproc) install

            - name: Build Dependency - libplacebo (Static)
              run: |
                  git clone --depth 1 --branch ${{ env.LIBPLACEBO_VERSION }} \
                    https://github.com/haasn/libplacebo.git
                  cd src/mpv/libplacebo
                  git submodule update --init --depth 1
                  PKG_CONFIG_PATH="${{ env.MPVPREFIX }}/lib/pkgconfig:${{ env.MPVPREFIX }}/lib/x86_64-linux-gnu/pkgconfig" \
                  meson setup build \
                    -Ddefault_library=static -Dbuildtype=release \
                    -Ddemos=false -Dtests=false -Dbench=false \
                    -Dvulkan=disabled -Dopengl=disabled -Dd3d11=disabled \
                    --prefix ${{ env.MPVPREFIX }}
                  meson install -C build

            - name: Build Dependency - libass (Static)
              run: |
                  git clone --depth 1 --branch ${{ env.LIBASS_VERSION }} \
                    https://github.com/libass/libass.git
                  cd src/mpv/libass
                  PKG_CONFIG_PATH="${{ env.MPVPREFIX }}/lib/pkgconfig:${{ env.MPVPREFIX }}/lib/x86_64-linux-gnu/pkgconfig" \
                  meson setup build \
                    -Ddefault_library=static -Dbuildtype=release \
                    -Dfontconfig=disabled -Drequire-system-font-provider=false \
                    --prefix ${{ env.MPVPREFIX }}
                  meson install -C build

            - name: Build libmpv (Shared)
              run: |
                  cd src/mpv
                  PKG_CONFIG_PATH="${{ env.MPVPREFIX }}/lib/pkgconfig:${{ env.MPVPREFIX }}/lib/x86_64-linux-gnu/pkgconfig" \
                  meson setup build \
                    -Dcplayer=false -Dlibmpv=true \
                    -Ddefault_library=shared -Dbuildtype=release \
                    -Dbuild-date=false -Dgpl=false \
                    -Dlua=disabled -Djavascript=disabled -Dcplugins=disabled \
                    -Dalsa=enabled \
                    -Dgl=disabled -Dvulkan=disabled -Degl=disabled \
                    -Dx11=disabled -Dwayland=disabled -Ddrm=disabled -Dgbm=disabled \
                    -Dvdpau=disabled -Dvaapi=disabled -Dcuda-hwaccel=disabled \
                    -Dlcms2=disabled -Dzimg=disabled -Djpeg=disabled \
                    -Dlibarchive=disabled -Drubberband=disabled \
                    -Dcdda=disabled -Ddvdnav=disabled -Dlibbluray=disabled \
                    -Duchardet=disabled -Dvapoursynth=disabled \
                    -Diconv=disabled -Dzlib=disabled \
                    -Dpulse=disabled -Dpipewire=disabled -Djack=disabled \
                    -Doss-audio=disabled -Dsndio=disabled -Dopenal=disabled \
                    -Dsdl2-video=disabled -Dsdl2-audio=disabled -Dsdl2-gamepad=disabled \
                    -Dcaca=disabled -Dsixel=disabled \
                    -Dmanpage-build=disabled -Dtests=false \
                    -Dc_args='-ffunction-sections -fdata-sections' \
                     -Dc_link_args='-Wl,--gc-sections -Wl,--as-needed -lstdc++'
                  meson compile -C build
                  strip build/libmpv.so
                  ls -lh build/libmpv.so

            - name: Upload Shared libmpv Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: libmpv-linux-x86_64
                  path: mpv/build/libmpv.so

    # Phase 4: Bundle and execute the heavy Electrobun bundler engine
    build-application:
        needs: [build-ffmpeg-shared, build-smtc-native, build-libmpv]
        runs-on: ubuntu-22.04
        defaults:
            run:
                working-directory: package
        steps:
            - uses: actions/checkout@v4

            - name: Setup System APT Dependencies Cache
              uses: actions/cache@v4
              with:
                  path: /var/cache/apt/archives
                  key: ${{ runner.os }}-apt-${{ hashFiles('**/package.json') }}
                  restore-keys: ${{ runner.os }}-apt-

            - name: Install Application System Dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential cmake pkg-config libgtk-3-dev libsoup2.4-dev \
                    libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev libfuse2 \
                    libpango1.0-dev libharfbuzz-dev

            - name: Setup Bun Cache
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('package/bun.lockb', 'package/package.json') }}
                  restore-keys: ${{ runner.os }}-bun-

            - name: Setup Bun Engine Environment
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install Package Bundles
              run: bun install

            - name: Setup Custom Script Toolchain Cache
              uses: actions/cache@v4
              with:
                  path: ${{ github.workspace }}/package/vendors/binaries
                  key: ${{ runner.os }}-script-deps-${{ hashFiles('package/build.ts') }}
                  restore-keys: ${{ runner.os }}-script-deps-

            - name: Compile and Release Asset Bundle
              env:
                  PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
              run: bun build.ts --release
