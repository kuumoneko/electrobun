    build-debian:
        # needs: build-macos
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: package
        steps:
            - uses: actions/checkout@v4
            - run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential cmake pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libfuse2 libpango1.0-dev libharfbuzz-dev
            - run: pkg-config --cflags harfbuzz pango gtk+-3.0
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - run: bun install

            - name: run Build
              env:
                  PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
              run: bun test.ts --release
